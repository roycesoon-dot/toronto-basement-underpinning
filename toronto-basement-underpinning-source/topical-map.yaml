local_context:
  - slug: basement-underpinning-the-annex
    neighborhood: The Annex
    parent_type: homepage
    parent_slug: null
    earned_relevance: High concentration of pre-1920 Victorian and Edwardian homes with shallow rubble or fieldstone foundations make underpinning especially common. Narrow lot widths force specialized excavation access strategies, and the neighborhood's renovation culture produces tight neighbour-coordination expectations.
  - slug: basement-underpinning-leslieville
    neighborhood: Leslieville
    parent_type: homepage
    parent_slug: null
    earned_relevance: Renovation-heavy semi-detached and row-house stock with narrow lot constraints. Underpinning is typically paired with full home renovation and rental-suite conversion — the demographic skews toward owner-occupiers building secondary suites for rental income.
  - slug: basement-underpinning-forest-hill
    neighborhood: Forest Hill
    parent_type: homepage
    parent_slug: null
    earned_relevance: Premium high-end home stock drives larger project scopes — home theatres, gyms, and wine cellars enabled by the new ceiling height. Longer timelines are acceptable for premium finishes, and projects are typically integrated with whole-house renovation.
  - slug: basement-underpinning-high-park
    neighborhood: High Park
    parent_type: homepage
    parent_slug: null
    earned_relevance: Historic housing stock near the ravine system creates elevated drainage and water-table considerations. Underpinning in this microclimate almost always pairs with interior waterproofing, and excavation logistics must respect the area's mature tree canopy.
  - slug: basement-underpinning-little-italy
    neighborhood: Little Italy
    parent_type: homepage
    parent_slug: null
    earned_relevance: Older brick row homes with characteristically low basements. Shared-wall structural considerations dominate planning, narrow lot access requires specialized equipment staging, and neighborhood demographics drive secondary-suite conversion demand.
  - slug: basement-underpinning-north-york
    neighborhood: North York
    parent_type: homepage
    parent_slug: null
    earned_relevance: 1950s–70s post-war bungalow stock with low original ceiling heights — among the strongest underpinning candidates in the GTA. Larger lots simplify excavation access, and the housing layout is naturally suited to legal basement apartments.
  - slug: basement-underpinning-etobicoke
    neighborhood: Etobicoke
    parent_type: homepage
    parent_slug: null
    earned_relevance: Older lakeshore homes with elevated water tables and varied soil conditions across the borough. Underpinning here is almost always integrated with waterproofing; soil reports often dictate sequencing changes and specialized backfill.
  - slug: basement-underpinning-mississauga
    neighborhood: Mississauga
    parent_type: homepage
    parent_slug: null
    earned_relevance: Established 1960s–80s housing stock with strong demand for ceiling-height upgrades and legal secondary suites. Larger suburban lots simplify excavation logistics, and the City of Mississauga building permit process differs meaningfully from City of Toronto — requiring separate permit-handling expertise.
