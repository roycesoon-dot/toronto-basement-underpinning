      - q: What ceiling height do I need for a legal basement apartment in Toronto?
        a_hint: Ontario Building Code Section 9.36 requires 6'5" minimum; 8 ft is comfortable and standard target.
      - q: Are hairline cracks always serious?
        a_hint: Hairline shrinkage cracks are usually cosmetic; horizontal or active cracks signal structural movement.
      - q: Can I just finish the basement without underpinning?
        a_hint: Only if ceiling height already meets code and there's no structural concern. Most older Toronto homes need lowering first.
