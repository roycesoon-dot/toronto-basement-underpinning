      - q: Is underpinning the same as lowering the basement?
        a_hint: Underpinning extends footings; the lowered floor follows. They're sequential, not the same step.
      - q: How is underpinning different from waterproofing?
        a_hint: Underpinning is structural (depth, footings); waterproofing is moisture management. Often paired.
      - q: Do all basements need underpinning to be finished?
        a_hint: No — only when ceiling height is below code or a legal apartment is planned.
